<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>WAV9 — RONDE / GLSL</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden;
    font-family: 'Courier New', Courier, monospace; }
  #wrap { position: fixed; inset: 0; }
  canvas { display: block; width: 100%; height: 100%; }
  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 26px;
    background: #000;
    transition: opacity 0.8s ease;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }
  #ttl { text-align: center; }
  #ttl h1 {
    font-size: 12px; font-weight: normal;
    letter-spacing: 0.4em; color: #fff; text-transform: uppercase;
  }
  #ttl p {
    margin-top: 5px; font-size: 8px;
    letter-spacing: 0.25em; color: rgba(255,255,255,0.25); text-transform: uppercase;
  }
  #btn {
    font-family: inherit; font-size: 9px;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: #fff; background: transparent;
    border: 1px solid rgba(255,255,255,0.25);
    padding: 10px 26px; cursor: pointer;
    transition: border-color 0.2s;
  }
  #btn:hover  { border-color: rgba(255,255,255,0.7); }
  #btn:disabled { opacity: 0.3; cursor: default; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="500" height="500"></canvas>
  <div id="overlay">
    <div id="ttl"><h1>WAV 9</h1><p>ronde — glsl</p></div>
    <button id="btn">▶ activer le micro</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// SHADERS
// ═══════════════════════════════════════════════════════════════════════════════

const VS = `
attribute vec2 a_pos;
varying   vec2 vUv;
void main() {
  vUv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}
`

// Simple blit — second pass: write FBO → screen
const BLIT_FS = `
precision mediump float;
varying vec2 vUv;
uniform sampler2D u_tex;
void main() { gl_FragColor = texture2D(u_tex, vUv); }
`

// ─── Main patch shader ────────────────────────────────────────────────────────
const MAIN_FS = `
precision highp float;

varying vec2 vUv;
uniform sampler2D u_prev;   // previous frame (ping-pong)

// Smoothed band values
uniform float u_Lv;    // low   — low sensitivity  (freq modulation)
uniform float u_Mv1;   // mid1  — low sensitivity
uniform float u_Mv2;   // mid2  — low sensitivity
uniform float u_Hv;    // high  — adapted sensitivity
uniform float u_vLv;   // low   — visual sensitivity (colours)
uniform float u_vMv1;  // mid1  — visual sensitivity
uniform float u_vMv2;  // mid2  — visual sensitivity
uniform float u_energy;
uniform vec3  u_tint;  // time-of-day colour tint

// ─── Value noise (3-D, smooth) ────────────────────────────────────────────────
// Matches Hydra's snoise behaviour: output ≈ −1…1 for bidirectional UV warp
float _h(float n) { return fract(sin(n) * 43758.5453123); }

float noise3d(vec3 p) {
  vec3 i = floor(p);
  vec3 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float n = i.x + i.y * 57.0 + 113.0 * i.z;
  return mix(
    mix( mix(_h(n+0.0),   _h(n+1.0),   f.x),
         mix(_h(n+57.0),  _h(n+58.0),  f.x), f.y ),
    mix( mix(_h(n+113.0), _h(n+114.0), f.x),
         mix(_h(n+170.0), _h(n+171.0), f.x), f.y ),
    f.z );
}

// hn : Hydra noise source.  Returns −1…1 so warp is bidirectional.
float hn(vec2 st, float scale, float offset) {
  return noise3d(vec3(st * scale, offset)) * 2.0 - 1.0;
}

// ─── Hydra primitive ops ──────────────────────────────────────────────────────

// osc(freq, sync=0, offset_phase)
// sync=0 → no time term; offset phases R/G/B by 1/3 each (0=monochrome)
vec4 hosc(vec2 st, float freq, float ph) {
  float f    = max(freq, 0.001);
  float base = st.x - ph / f;
  float r = sin(base * f) * 0.5 + 0.5;
  float g = sin((base + 1.0/3.0) * f) * 0.5 + 0.5;
  float b = sin((base + 2.0/3.0) * f) * 0.5 + 0.5;
  return vec4(r, g, b, 1.0);
}
vec4 hcol(vec4 c, float r, float g, float b) {
  return vec4(c.r*r, c.g*g, c.b*b, c.a);
}
vec4 hcon(vec4 c, float a) {
  return clamp((c - 0.5) * a + 0.5, 0.0, 1.0);
}
vec4 hbri(vec4 c, float a) {
  return vec4(c.rgb + a, c.a);
}
vec4 hadd(vec4 c0, vec4 c1, float a) {
  return clamp(c0 + c1 * a, 0.0, 1.0);
}
vec4 hblend(vec4 c0, vec4 c1, float a) {   // c0 * (1−a) + c1 * a
  return c0 * (1.0 - a) + c1 * a;
}

// ─── Main ─────────────────────────────────────────────────────────────────────
void main() {
  vec2  st   = vUv;
  float Lv   = u_Lv,   Mv1 = u_Mv1,  Mv2 = u_Mv2,  Hv  = u_Hv;
  float vLv  = u_vLv,  vM1 = u_vMv1, vM2 = u_vMv2;
  float E    = u_energy;
  bool  live = E > 0.05;
  float FBG  = live ? pow((E - 0.05) / 0.95, 1.2) : 0.0;

  // ── Wave fields evaluated at st ─────────────────────────────────────────────
  // scale driven by band value → low-level modulation of oscillator shape
  float wfL  = hn(st, 0.18 + Lv  * 0.015, 0.0);
  float wfM1 = hn(st, 0.15 + Mv1 * 0.025, 0.0);
  float wfM2 = hn(st, 0.50 + Mv2 * 0.035, 0.0);
  float wfH  = hn(st, 0.80 + Hv  * 0.080, 0.0);

  // ── oscLow  → 2–4.5 bands — grandes ondulations → rouge ────────────────────
  vec2 stL = st + vec2(wfL) * (0.25 + Lv * 0.55);
  vec4 cL  = hosc(stL, 2.0 + Lv * 2.5, 0.0);
  cL = hcol(cL, vLv * 3.5, 0.0, 0.0);
  cL = hcon(cL, 1.2 + vLv * 2.0);
  cL = hbri(cL, -0.3 + vLv * 0.35);

  // ── oscMid1 → 5–11 bands — vagues moyennes → vert ──────────────────────────
  vec2 stM1 = st + vec2(wfM1) * (0.18 + Mv1 * 0.40);
  vec4 cM1  = hosc(stM1, 5.0 + Mv1 * 6.0, 1.0);
  cM1 = hcol(cM1, 0.0, vM1 * 3.5, 0.0);
  cM1 = hcon(cM1, 1.2 + vM1 * 2.0);
  cM1 = hbri(cM1, -0.3 + vM1 * 0.35);

  // ── oscMid2 → 11–19 bands — vagues intermédiaires → jaune/orange ───────────
  vec2 stM2 = st + vec2(wfM2) * (0.12 + Mv2 * 0.30);
  vec4 cM2  = hosc(stM2, 11.0 + Mv2 * 8.0, 2.0);
  cM2 = hcol(cM2, vM2 * 3.0, vM2 * 2.0, 0.0);
  cM2 = hcon(cM2, 1.2 + vM2 * 2.0);
  cM2 = hbri(cM2, -0.3 + vM2 * 0.35);

  // ── oscHigh → 22–38 bands — vagues fines → violet pur ──────────────────────
  vec2 stH = st + vec2(wfH) * (0.08 + Hv * 0.22);
  vec4 cH  = hosc(stH, 22.0 + Hv * 16.0, 3.0);
  cH = hcol(cH, Hv * 0.5, 0.0, Hv * 5.5);
  cH = hcon(cH, 1.4 + Hv * 2.0);
  // brightness(0) → no-op

  // ── Combined mix ────────────────────────────────────────────────────────────
  vec4 res = cL;
  res = hadd(res, cM1, min(1.0, vM1 * 2.0));
  res = hadd(res, cM2, min(1.0, vM2 * 2.0));
  res = hadd(res, cH,  min(1.0, Hv  * 2.0));
  res = hcon(res, 1.1 + E * 0.8);
  res = hbri(res, -0.2 + E * 0.25);

  // ── Feedback — two independent warp fields ──────────────────────────────────
  // fbWarpSlow = noise(1.2, 0.015)  — driven by low-band energy
  // fbWarpFast = noise(4.5, 0.04)   — driven by high-band energy
  vec2 fbSt = st
    + vec2(hn(st, 1.2, 0.015)) * (vLv * 0.04 * FBG)
    + vec2(hn(st, 4.5, 0.04))  * (Hv  * 0.03 * FBG);
  fbSt = clamp(fbSt, 0.0, 1.0);

  vec4 fb = texture2D(u_prev, fbSt);
  fb = hbri(fb, -(0.006 - E * 0.005));   // slow decay at silence

  // fbBlend: silence = 0.30, active max = 0.95
  float fbA = live ? min(0.95, 0.82 + E * 0.13) : 0.30;
  res = hblend(res, fb, fbA);

  // ── Time-of-day tint ────────────────────────────────────────────────────────
  res = hcol(res, u_tint.r, u_tint.g, u_tint.b);

  gl_FragColor = res;
}
`

// ═══════════════════════════════════════════════════════════════════════════════
// TIME TINT
// ═══════════════════════════════════════════════════════════════════════════════
function tintAt(d) {
  const h = d.getHours() + d.getMinutes() / 60
  if (h >= 23 || h < 5)  return [0.70, 0.80, 1.30]  // nuit        — bleu froid
  if (h < 7)             return [1.30, 0.90, 0.60]  // aube        — orange
  if (h < 9)             return [1.20, 1.10, 0.90]  // matin       — doré
  if (h < 18)            return [1.00, 1.00, 1.00]  // jour        — neutre
  if (h < 20)            return [1.30, 0.85, 0.60]  // crépuscule  — ambre
  if (h < 22)            return [1.10, 0.70, 1.00]  // soir        — violet
  return                        [0.80, 0.70, 1.20]  // nuit tombée — indigo
}

// ═══════════════════════════════════════════════════════════════════════════════
// BAND PROCESSING  (input normalized 0-1 from FFT)
// ═══════════════════════════════════════════════════════════════════════════════
const pBand = raw => {
  let v = Math.pow(Math.max(0, (raw - 0.01) * 0.80), 0.65)
  return Math.min(1, v)
}
const pVisual = raw => {
  let v = Math.pow(Math.max(0, (raw - 0.01) * 2.0), 0.50)
  return Math.min(1, v)
}
const pHigh = raw => {
  let v = Math.pow(Math.max(0, (raw - 0.01) * 3.5), 0.50)
  return Math.min(1, v)
}

// ═══════════════════════════════════════════════════════════════════════════════
// SHARED AUDIO STATE
// ═══════════════════════════════════════════════════════════════════════════════
const raw = { low: 0, mid1: 0, mid2: 0, high: 0 }
let _Lv = 0, _Mv1 = 0, _Mv2 = 0, _Hv = 0
let _vLv = 0, _vMv1 = 0, _vMv2 = 0
let _energy = 0
let _tc = tintAt(new Date())
setInterval(() => { _tc = tintAt(new Date()) }, 60_000)

const ATK = 0.85, REL = 0.75
const lerp = (a, b, t) => a + (b - a) * t;

(function smoothLoop() {
  const rL  = pBand(raw.low),   rM1 = pBand(raw.mid1)
  const rM2 = pBand(raw.mid2),  rH  = pHigh(raw.high)
  _Lv  = lerp(_Lv,  rL,  rL  > _Lv  ? ATK : REL)
  _Mv1 = lerp(_Mv1, rM1, rM1 > _Mv1 ? ATK : REL)
  _Mv2 = lerp(_Mv2, rM2, rM2 > _Mv2 ? ATK : REL)
  _Hv  = lerp(_Hv,  rH,  rH  > _Hv  ? ATK : REL)

  const vL  = pVisual(raw.low),  vM1 = pVisual(raw.mid1), vM2 = pVisual(raw.mid2)
  _vLv  = lerp(_vLv,  vL,  vL  > _vLv  ? ATK : REL)
  _vMv1 = lerp(_vMv1, vM1, vM1 > _vMv1 ? ATK : REL)
  _vMv2 = lerp(_vMv2, vM2, vM2 > _vMv2 ? ATK : REL)

  const peak = Math.max(_vLv, _vMv1, _vMv2, _Hv)
  _energy = lerp(_energy, peak, peak > _energy ? 0.85 : 0.70)
  requestAnimationFrame(smoothLoop)
})()

// ═══════════════════════════════════════════════════════════════════════════════
// AUDIO INIT
// ═══════════════════════════════════════════════════════════════════════════════
async function initAudio() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false })
  const ctx    = new (window.AudioContext || window.webkitAudioContext)()
  const src    = ctx.createMediaStreamSource(stream)
  const ana    = ctx.createAnalyser()
  ana.fftSize = 2048; ana.smoothingTimeConstant = 0.25
  src.connect(ana)

  const N    = ana.frequencyBinCount
  const data = new Uint8Array(N)
  const bw   = ctx.sampleRate / ana.fftSize

  const lE  = Math.floor(250   / bw)
  const m1E = Math.floor(2000  / bw)
  const m2E = Math.floor(6000  / bw)
  const hE  = Math.min(N - 1, Math.floor(20000 / bw))

  const avg = (arr, s, e) => {
    let sum = 0
    for (let i = s; i <= e; i++) sum += arr[i]
    return sum / ((e - s + 1) * 255)
  }

  ;(function audioLoop() {
    ana.getByteFrequencyData(data)
    raw.low  = avg(data, 1,       lE)
    raw.mid1 = avg(data, lE  + 1, m1E)
    raw.mid2 = avg(data, m1E + 1, m2E)
    raw.high = avg(data, m2E + 1, hE)
    requestAnimationFrame(audioLoop)
  })()
}

// ═══════════════════════════════════════════════════════════════════════════════
// WEBGL INIT
// ═══════════════════════════════════════════════════════════════════════════════
function initGL() {
  const canvas = document.getElementById('c')
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl')
  if (!gl) throw new Error('WebGL non supporté')

  // ── Compile / link ──────────────────────────────────────────────────────────
  function shader(type, src) {
    const s = gl.createShader(type)
    gl.shaderSource(s, src)
    gl.compileShader(s)
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
      throw new Error('Shader error:\n' + gl.getShaderInfoLog(s))
    return s
  }
  function prog(fsrc) {
    const p = gl.createProgram()
    gl.attachShader(p, shader(gl.VERTEX_SHADER,   VS))
    gl.attachShader(p, shader(gl.FRAGMENT_SHADER, fsrc))
    gl.linkProgram(p)
    if (!gl.getProgramParameter(p, gl.LINK_STATUS))
      throw new Error('Link error:\n' + gl.getProgramInfoLog(p))
    return p
  }

  const mainProg = prog(MAIN_FS)
  const blitProg = prog(BLIT_FS)

  // ── Fullscreen quad ─────────────────────────────────────────────────────────
  const quad = gl.createBuffer()
  gl.bindBuffer(gl.ARRAY_BUFFER, quad)
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW)

  function bindQuad(p) {
    gl.bindBuffer(gl.ARRAY_BUFFER, quad)
    const loc = gl.getAttribLocation(p, 'a_pos')
    gl.enableVertexAttribArray(loc)
    gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0)
  }

  // ── Ping-pong framebuffers ──────────────────────────────────────────────────
  function makeFBO(w, h) {
    const tex = gl.createTexture()
    gl.bindTexture(gl.TEXTURE_2D, tex)
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, w, h, 0, gl.RGBA, gl.UNSIGNED_BYTE, null)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE)
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE)
    const fbo = gl.createFramebuffer()
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo)
    gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0)
    gl.bindFramebuffer(gl.FRAMEBUFFER, null)
    return { tex, fbo }
  }

  const W = 500, H = 500
  const fbos = [makeFBO(W, H), makeFBO(W, H)]

  // Clear both to opaque black
  fbos.forEach(({ fbo }) => {
    gl.bindFramebuffer(gl.FRAMEBUFFER, fbo)
    gl.clearColor(0, 0, 0, 1)
    gl.clear(gl.COLOR_BUFFER_BIT)
  })
  gl.bindFramebuffer(gl.FRAMEBUFFER, null)

  // ── Uniform locations ───────────────────────────────────────────────────────
  const U = {
    prev:   gl.getUniformLocation(mainProg, 'u_prev'),
    Lv:     gl.getUniformLocation(mainProg, 'u_Lv'),
    Mv1:    gl.getUniformLocation(mainProg, 'u_Mv1'),
    Mv2:    gl.getUniformLocation(mainProg, 'u_Mv2'),
    Hv:     gl.getUniformLocation(mainProg, 'u_Hv'),
    vLv:    gl.getUniformLocation(mainProg, 'u_vLv'),
    vMv1:   gl.getUniformLocation(mainProg, 'u_vMv1'),
    vMv2:   gl.getUniformLocation(mainProg, 'u_vMv2'),
    energy: gl.getUniformLocation(mainProg, 'u_energy'),
    tint:   gl.getUniformLocation(mainProg, 'u_tint'),
  }
  const blitTex = gl.getUniformLocation(blitProg, 'u_tex')

  // ── Render loop ─────────────────────────────────────────────────────────────
  let cur = 0

  ;(function frame() {
    const write = fbos[cur]
    const read  = fbos[1 - cur]

    // Pass 1 — compute patch → write FBO
    gl.useProgram(mainProg)
    bindQuad(mainProg)

    gl.activeTexture(gl.TEXTURE0)
    gl.bindTexture(gl.TEXTURE_2D, read.tex)
    gl.uniform1i(U.prev, 0)

    gl.uniform1f(U.Lv,     _Lv)
    gl.uniform1f(U.Mv1,    _Mv1)
    gl.uniform1f(U.Mv2,    _Mv2)
    gl.uniform1f(U.Hv,     _Hv)
    gl.uniform1f(U.vLv,    _vLv)
    gl.uniform1f(U.vMv1,   _vMv1)
    gl.uniform1f(U.vMv2,   _vMv2)
    gl.uniform1f(U.energy, _energy)
    gl.uniform3fv(U.tint,  _tc)

    gl.bindFramebuffer(gl.FRAMEBUFFER, write.fbo)
    gl.viewport(0, 0, W, H)
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)

    // Pass 2 — blit write FBO → screen
    gl.useProgram(blitProg)
    bindQuad(blitProg)

    gl.activeTexture(gl.TEXTURE0)
    gl.bindTexture(gl.TEXTURE_2D, write.tex)
    gl.uniform1i(blitTex, 0)

    gl.bindFramebuffer(gl.FRAMEBUFFER, null)
    gl.viewport(0, 0, W, H)
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4)

    cur = 1 - cur
    requestAnimationFrame(frame)
  })()
}

// ═══════════════════════════════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════════════════════════════
const btn     = document.getElementById('btn')
const overlay = document.getElementById('overlay')

btn.addEventListener('click', async () => {
  btn.disabled = true; btn.textContent = '…'
  try {
    initGL()
    await initAudio()
    overlay.classList.add('hidden')
  } catch (e) {
    console.error(e)
    btn.disabled = false
    btn.textContent = e.name === 'NotAllowedError' ? '⚠ micro refusé' : '⚠ erreur — réessayer'
  }
})
</script>
</body>
</html>
